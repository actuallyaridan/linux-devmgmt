name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-24.04
            arch: x86_64
          - os: ubuntu-24.04-arm
            arch: aarch64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake qt6-base-dev libgl1-mesa-dev

      - name: Build
        run: |
          cmake -B build -S . -DCMAKE_BUILD_TYPE=Release
          cmake --build build -j$(nproc)

      - name: Rename binary
        run: cp build/devmgmt devmgmt-${{ matrix.arch }}

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: devmgmt-${{ matrix.arch }}

  aur:
    name: Publish to AUR
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Get version
        id: version
        run: echo "tag=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Compute sha256sum
        id: sha
        run: |
          URL="https://github.com/actuallyaridan/linux-devmgmt/archive/refs/tags/v${{ steps.version.outputs.tag }}.tar.gz"
          echo "sum=$(curl -sL $URL | sha256sum | cut -d' ' -f1)" >> $GITHUB_OUTPUT

      - name: Checkout AUR linux-devmgmt
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AUR_SSH_KEY }}" > ~/.ssh/aur_id_ed25519
          chmod 600 ~/.ssh/aur_id_ed25519
          ssh-keyscan aur.archlinux.org >> ~/.ssh/known_hosts
          cat >> ~/.ssh/config << 'EOF'
          Host aur.archlinux.org
            IdentityFile ~/.ssh/aur_id_ed25519
            User aur
          EOF
          git clone ssh://aur@aur.archlinux.org/linux-devmgmt.git aur-linux-devmgmt
          git clone ssh://aur@aur.archlinux.org/linux-devmgmt-git.git aur-linux-devmgmt-git

      - name: Update linux-devmgmt PKGBUILD
        run: |
          cd aur-linux-devmgmt
          VER="${{ steps.version.outputs.tag }}"
          SUM="${{ steps.sha.outputs.sum }}"
          cat > PKGBUILD << EOF
          # Maintainer: actuallyaridan <https://github.com/actuallyaridan>
          pkgname=linux-devmgmt
          pkgver=$VER
          pkgrel=1
          pkgdesc="A faithful recreation of the Windows Device Manager"
          arch=('x86_64' 'aarch64')
          url="https://github.com/actuallyaridan/linux-devmgmt"
          license=('MIT')
          depends=('qt6-base')
          makedepends=('cmake' 'ninja')
          source=("\$pkgname-\$pkgver.tar.gz::https://github.com/actuallyaridan/linux-devmgmt/archive/refs/tags/v\$pkgver.tar.gz")
          sha256sums=('$SUM')

          build() {
              cmake -S "\$pkgname-\$pkgver" -B build \\
                  -G Ninja \\
                  -DCMAKE_BUILD_TYPE=Release \\
                  -DCMAKE_INSTALL_PREFIX=/usr
              cmake --build build
          }

          package() {
              DESTDIR="\$pkgdir" cmake --install build
              install -Dm644 "\$pkgname-\$pkgver/LICENSE" "\$pkgdir/usr/share/licenses/\$pkgname/LICENSE"
          }
          EOF
          cat > .SRCINFO << EOF
          pkgbase = linux-devmgmt
          	pkgdesc = A faithful recreation of the Windows Device Manager
          	pkgver = $VER
          	pkgrel = 1
          	url = https://github.com/actuallyaridan/linux-devmgmt
          	arch = x86_64
          	arch = aarch64
          	license = MIT
          	makedepends = cmake
          	makedepends = ninja
          	depends = qt6-base
          	source = linux-devmgmt-$VER.tar.gz::https://github.com/actuallyaridan/linux-devmgmt/archive/refs/tags/v$VER.tar.gz
          	sha256sums = $SUM

          pkgname = linux-devmgmt
          EOF
          git config user.name "actuallyaridan"
          git config user.email "adnan@aridan.net"
          git add PKGBUILD .SRCINFO
          git diff --cached --quiet || git commit -m "Update to v${{ steps.version.outputs.tag }}"
          git push

      - name: Update linux-devmgmt-git PKGBUILD
        run: |
          cd aur-linux-devmgmt-git
          git config user.name "actuallyaridan"
          git config user.email "adnan@aridan.net"
          git add PKGBUILD .SRCINFO
          git diff --cached --quiet || git commit -m "Update to v${{ steps.version.outputs.tag }}"
          git push
